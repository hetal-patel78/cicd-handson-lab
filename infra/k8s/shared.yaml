# Base Helm values — applied to all environments
# Used with Xero's PaaS generic-service Helm chart

nameOverride: my-subscription-service
fullnameOverride: my-subscription-service

namespace: billing-buyflow

image:
  repository: billing-api-docker-common.artifactory.xero-support.com/my-subscription-service
  tag: latest
  pullPolicy: Always

containerPort: 5210

resources:
  requests:
    cpu: 400m
    memory: 512Mi
  limits:
    cpu: 800m
    memory: 1024Mi

probes:
  liveness:
    path: /ping
    port: 5210
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /ready
    port: 5210
    initialDelaySeconds: 5
    periodSeconds: 10

ingress:
  enabled: true
  sslRedirect: true
  annotations:
    kubernetes.io/ingress.class: nginx

env:
  - name: ASPNETCORE_ENVIRONMENT
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace

podAnnotations:
  sumologic.com/sourceCategory: "my-subscription-service"
  sumologic.com/format: "json"

serviceAccount:
  create: true
  name: my-subscription-service