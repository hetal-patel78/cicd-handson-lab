# batect.yml
# batect is a containerised task runner - it ensures CI and local
# dev run in exactly the same environment, eliminating
# "works on my machine" problems.
#
# In your company, this file defines the entire test environment:
#   - billing-db (SQL Server for integration tests)
#   - build-tools (container with .NET SDK + tools)
#   - identity-mock, subscription-service, etc.
# Tasks like `./batect unit-test` and `./batect integration-test`
# spin up these containers and run inside them.
include:
  - .batect/development.yml
