# GitVersion Configuration
# Derives semantic version numbers automatically from git history.
# This is the "single source of truth" for versioning - the same
# version flows through build → artifact → Docker tag → Octopus release.
#
# Mode: ContinuousDeployment means every commit gets a unique
# pre-release version (e.g., 1.2.3-feature-branch.4+5).
# In your company, this feeds the version.sh script which produces
# fileVersion, artifactVersion, imageVersion, imageName.
mode: ContinuousDelivery
next-version: 1.0.0

# Branch-specific rules control how versions are calculated
# depending on whether you're on main, a feature branch, etc.
branches:
  main:
    regex: ^main$
    increment: patch        # main bumps the patch digit
    source-branches: ['feature']
    is-mainline: true

  feature:
    regex: ^feature/[-_A-Za-z0-9]+$
    increment: Minor        # Feature branches bump minor
    source-branches: ['main']
    tag: useBranchName

ignore:
  sha: []
