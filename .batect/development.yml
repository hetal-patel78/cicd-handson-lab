# .batect/development.yml
# Defines the development/test environment containers and tasks.
# Both CI and local dev use this same file, so environments are identical.
containers:
  build-tools:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    volumes:
      - local: .
        container: /workspace
    working_directory: /workspace

tasks:
  unit-test:
    description: Run unit tests with coverage.
    run:
      container: build-tools
      command: bash -c "
        dotnet test tests/MySubscriptionService.UnitTests/MySubscriptionService.UnitTests.csproj
        --configuration Release
        --collect:\"XPlat Code Coverage\"
        --results-directory /workspace/coverage/unit
      "

  integration-test:
    description: Run integration tests with coverage.
    run:
      container: build-tools
      command: bash -c "
        dotnet test tests/MySubscriptionService.IntegrationTests/MySubscriptionService.IntegrationTests.csproj
        --configuration Release
        --collect:\"XPlat Code Coverage\"
        --results-directory /workspace/coverage/integration
      "

  coverage-report:
    description: Generate merged coverage report.
    run:
      container: build-tools
      command: bash -c "
        dotnet tool install -g dotnet-reportgenerator-globaltool --quiet 2>/dev/null || true
        reportgenerator
        -reports:/workspace/coverage/**/coverage.cobertura.xml
        -targetdir:/workspace/coverage-report
        -reporttypes:Html
      "
