AWSTemplateFormatVersion: '2010-09-09'
Description: MySubscriptionService - ECS Service + Scheduled Job Host (LocalStack-compatible)

Parameters:
  EnvironmentName:
    Type: String
    Default: test
  ImageVersion:
    Type: String
    Default: latest
  DesiredCount:
    Type: Number
    Default: 1
  VpcId:
    Type: String
    Default: "vpc-00000000"
  SubnetIds:
    Type: List<String>
    Default: "subnet-00000000"

Resources:

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "my-subscription-${EnvironmentName}"

  ServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/my-subscription-service/${EnvironmentName}"
      RetentionInDays: 14

  JobLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/my-subscription-scheduled-job/${EnvironmentName}"
      RetentionInDays: 14

  ServiceTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  ServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "my-subscription-service-${EnvironmentName}"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ServiceTaskRole
      TaskRoleArn: !Ref ServiceTaskRole
      ContainerDefinitions:
        - Name: subscription-service
          Image: !Sub "ghcr.io/hetal-patel78/my-subscription-service:${ImageVersion}"
          Essential: true
          PortMappings:
            - ContainerPort: 80
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: ASPNETCORE_ENVIRONMENT
              Value: !Ref EnvironmentName

  ServiceTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "my-subscription-tg-${EnvironmentName}"
      Port: 80
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /ping
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 4

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security group for subscription-service-${EnvironmentName}"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "my-subscription-service-${EnvironmentName}"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ServiceTaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref ServiceSecurityGroup

  ScheduledJobTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  ScheduledJobTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "my-subscription-scheduled-job-${EnvironmentName}"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !Ref ScheduledJobTaskRole
      TaskRoleArn: !Ref ScheduledJobTaskRole
      ContainerDefinitions:
        - Name: scheduled-job-host
          Image: !Sub "ghcr.io/hetal-patel78/my-subscription-service-scheduled-job:${ImageVersion}"
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref JobLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: JOB_TO_EXECUTE
              Value: "ClearSubscriptionEventData"

Outputs:
  ClusterName:
    Value: !Ref ECSCluster
  TaskDefinitionArn:
    Value: !Ref ServiceTaskDefinition
